name: CI
# Calls the reusable CI checks workflow on push to main and PRs.

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci-checks.yml
    permissions:
      contents: read
