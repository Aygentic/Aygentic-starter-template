name: CI
# Unified CI workflow replacing test-backend.yml + test-docker-compose.yml

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  frontend-changes:
    name: Detect Frontend Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            changed:
              - frontend/**
              - .github/workflows/ci.yml

  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Install dependencies
        run: uv sync
        working-directory: backend
      - name: Ruff check
        run: uv run ruff check app/
        working-directory: backend
      - name: Ruff format check
        run: uv run ruff format --check app/
        working-directory: backend
      - name: Mypy
        run: uv run mypy app
        working-directory: backend

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Install dependencies
        run: uv sync
        working-directory: backend
      - name: Run tests
        run: uv run coverage run -m pytest tests/unit/ tests/integration/ -v
        working-directory: backend
        env:
          SUPABASE_URL: "http://localhost:54321"
          SUPABASE_SERVICE_KEY: "test-service-key"
          CLERK_SECRET_KEY: "test-clerk-key"
          ENVIRONMENT: "local"
      - name: Coverage report
        run: uv run coverage report --fail-under=90
        working-directory: backend
      - name: Coverage HTML
        if: always()  # generate report even when --fail-under threshold fails
        run: uv run coverage html
        working-directory: backend
      - name: Store coverage files
        if: always()  # upload report even when --fail-under threshold fails
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true

  frontend-ci:
    name: Frontend Lint & Build
    needs: [frontend-changes]
    if: ${{ needs.frontend-changes.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Build
        run: bun run build
        working-directory: frontend

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build backend image
        run: docker build -t test-backend . -f backend/Dockerfile

  # Branch protection gate
  alls-green:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, docker-build, frontend-ci, frontend-changes]
    if: always()
    steps:
      - name: Check all jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: frontend-ci
