name: CI Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend-changes:
    name: Detect Frontend Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            changed:
              - frontend/**
              - .github/workflows/ci.yml
              - .github/workflows/ci-checks.yml

  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Install dependencies
        run: uv sync
        working-directory: backend
      - name: Ruff check
        run: uv run ruff check app/
        working-directory: backend
      - name: Ruff format check
        run: uv run ruff format --check app/
        working-directory: backend
      - name: Mypy
        run: uv run mypy app
        working-directory: backend

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Install dependencies
        run: uv sync
        working-directory: backend
      - name: Run tests
        run: uv run coverage run -m pytest tests/unit/ tests/integration/ -v
        working-directory: backend
        env:
          SUPABASE_URL: "http://localhost:54321"
          SUPABASE_SERVICE_KEY: "test-service-key"
          CLERK_SECRET_KEY: "test-clerk-key"
          ENVIRONMENT: "local"
      - name: Coverage report
        run: uv run coverage report --fail-under=90
        working-directory: backend
      - name: Coverage HTML
        if: always()
        run: uv run coverage html
        working-directory: backend
      - name: Store coverage files
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true

  backend-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
      - name: Install dependencies
        run: uv sync
        working-directory: backend
      - name: Export requirements and audit
        run: |
          uv export --format requirements-txt --no-hashes > requirements.txt
          uv run pip-audit --requirement requirements.txt --strict
        working-directory: backend

  frontend-ci:
    name: Frontend Lint & Build
    needs: [frontend-changes]
    if: ${{ needs.frontend-changes.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Build
        run: bun run build
        working-directory: frontend

  frontend-test:
    name: Frontend Tests
    needs: [frontend-changes]
    if: ${{ needs.frontend-changes.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Run tests with coverage
        run: bun run test:coverage
        working-directory: frontend
      - name: Store coverage files
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: frontend-coverage-html
          path: frontend/coverage
          include-hidden-files: true

  frontend-audit:
    name: Frontend Dependency Audit
    needs: [frontend-changes]
    if: ${{ needs.frontend-changes.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Audit dependencies
        run: bun audit
        continue-on-error: true
        working-directory: frontend

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3
      - name: Build backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: test-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  alls-green:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - backend-audit
      - docker-build
      - frontend-ci
      - frontend-test
      - frontend-audit
      - frontend-changes
    if: always()
    steps:
      - name: Check all jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: frontend-ci, frontend-test, frontend-audit
