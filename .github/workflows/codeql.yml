name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@3b054500189c7b3ca9be7cd4f035ca58c00776cd # v3
        with:
          languages: ${{ matrix.language }}
          dependency-caching: true

      - name: Autobuild
        uses: github/codeql-action/autobuild@3b054500189c7b3ca9be7cd4f035ca58c00776cd # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@3b054500189c7b3ca9be7cd4f035ca58c00776cd # v3
        with:
          category: "/language:${{ matrix.language }}"
