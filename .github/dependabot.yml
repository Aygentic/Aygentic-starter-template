# Dependabot Configuration
#
# Template default: GitHub Actions updated daily (auto-PRs), Python and Docker
# monitored but no auto-PRs (sensitive upgrades).
#
# For production projects forked from this template:
# - Disable Dependabot entirely: delete this file or run
#   gh api -X PUT repos/{owner}/{repo}/vulnerability-alerts -f state=disabled
# - Or customize per-ecosystem: set open-pull-requests-limit to 0 (monitor only)
#   or remove ecosystems you don't want tracked.
# - Security alerts (CVEs) are separate from version updates and configured in
#   repo Settings > Code security > Dependabot alerts.

version: 2
updates:
  # GitHub Actions — auto-PRs enabled (keeps SHA pins current)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal]
  # Python uv — alerts only, no automatic PRs (Python upgrades are sensitive)
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal]
  # bun
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal]
    ignore:
      - dependency-name: "@hey-api/openapi-ts"
  # Docker — alerts only, no automatic PRs (base image upgrades need manual testing)
  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal]
  # Docker Compose
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal]
